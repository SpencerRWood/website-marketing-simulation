# ============================================================
# Simulation Runtime Configuration
# ============================================================

run:
  run_id: "auto"           # If "auto", generated at runtime. Attached to all outputs.
  seed: 123                # Master RNG seed (guarantees deterministic runs).
  start_date: "2026-01-01" # Simulation start date (UTC).
  num_days: 30             # Number of simulated calendar days.


# ============================================================
# Storage (Cold Layer)
# ============================================================

storage:
  duckdb_path: "data/sim.duckdb"  # Cold storage sink.
  clean_slate: true               # If true, database is recreated per run.
  flush:
    every_n_events: 5000
    or_every_seconds: 30


# ============================================================
# Logging
# ============================================================

logging:
  level: "INFO"  # Structured logging level.


# ============================================================
# Users (Hot Layer Behavioral Engine)
# ============================================================

users:

  # Probability that a new intent creates a brand-new user.
  # If users already exist:
  #   With probability new_user_share → create new user.
  #   Otherwise → select an existing user via weighted sampling.
  new_user_share: 0.85


  # ----------------------------------------------------------
  # Returning User Selection Model
  # ----------------------------------------------------------
  selection:

    # Currently supported mode:
    # "recency_propensity_weighted"
    #
    # Weight formula:
    #
    #   weight_i =
    #       recency_weight * recency_score_i
    #     + propensity_weight * propensity_i
    #
    # where:
    #   recency_score_i = exp(-ln(2) * age_hours / half_life)
    #
    # So:
    #   age = half_life → score = 0.5
    #   age = 2*half_life → score = 0.25
    #
    mode: "recency_propensity_weighted"

    # Half-life (in hours) for recency decay.
    recency_half_life_hours: 18

    # Weight assigned to latent user propensity (0–1).
    propensity_weight: 0.5

    # Weight assigned to recency score.
    recency_weight: 0.5


  # ----------------------------------------------------------
  # Latent Propensity Distribution (User Heterogeneity)
  # ----------------------------------------------------------
  propensity:
    init:
      # Distribution used when creating a new user.
      # "uniform" → U(0,1)
      # "beta"    → Beta(alpha, beta)
      dist: "beta"

      # Beta(alpha, beta) parameters.
      # Mean = alpha / (alpha + beta)
      # (2,6) → mean ≈ 0.25
      alpha: 2.0
      beta: 6.0


  # ----------------------------------------------------------
  # Discovery Mode (New User State)
  # ----------------------------------------------------------
  discovery_mode:
    enabled: true
    graduation_sessions: 2
    dropoff_multiplier: 1.25
    conversion_logit_shift: -0.8


# ============================================================
# Intent Resolver
# ============================================================

intent_resolver:
  enabled: true


# ============================================================
# Arrivals
# ============================================================

arrivals:
  baseline_arrivals:
    model: "nhpp"
    daily_expected_intents: 2000
    intraday_curve:
      type: "gaussian_peak"
      peak_hour: 12.0
      spread_hours: 3.0
      floor: 0.05


# ============================================================
# Site Graph
# ============================================================

site_graph:
  pages:
    home:
      dropoff_p: 0.25
      transitions:
        - ["product", 0.55]
        - ["pricing", 0.25]

    product:
      dropoff_p: 0.15
      transitions:
        - ["pricing", 0.35]
        - ["home", 0.10]

    pricing:
      dropoff_p: 0.20
      transitions:
        - ["checkout", 0.35]
        - ["home", 0.10]

    checkout:
      dropoff_p: 0.30
      transitions: []


# ============================================================
# Sessions
# ============================================================

sessions:
  inactivity_timeout_minutes: 30
  max_steps: null
  entry_page: "home"

  inter_page_time:
    # Options: fixed | exponential
    dist: "exponential"
    fixed_seconds: 10.0
    mean_seconds: 10.0


# ============================================================
# Conversion
# ============================================================

conversion:
  # Currently supported: "logistic"
  model: "logistic"

  # Hard cap on conversion probability per session.
  cap: 0.35

  # Baseline log-odds of conversion for an average user.
  # -3.0 => ~4.7% before propensity + discovery modifiers
  base_logit: -3.0

  # Multiplier on user propensity in logit space.
  propensity_coef: 2.0

# ============================================================
# Channels (Execution Layer)
# ============================================================
#
# Channels are traffic generators that create exposures → clicks → session_intents.
# They can operate in:
#   1) Rate-driven mode (current): Poisson exposures per user per day
#   2) Delivery-plan mode (future): impressions provided by campaign layer
#
# All randomness flows through the seeded RNG.
# All click → intent logic is configurable per channel.
#
# Important:
# - Channels DO NOT contain adstock or saturation logic.
# - Channels are execution mechanics only.
# - Transformations (adstock, saturation) occur upstream in future features.
#

channels:

  # ------------------------------------------------------------
  # Paid Display (Upper / Mid Funnel)
  # ------------------------------------------------------------
  #
  # Broad reach channel with:
  #   - High impression volume
  #   - Low CTR
  #   - Viewability filtering
  #   - Strong frequency caps
  #
  # Rate-driven interpretation:
  #   For each user:
  #     N ~ Poisson(exposure_rate_per_user_per_day)
  #     Each impression passes viewability filter (viewable_share)
  #     Up to freq_cap_per_user_per_day exposures per user
  #
  # Modeling assumptions:
  #   - Broad targeting (no in-market gating)
  #   - High incrementality relative to search
  #   - No demand capture logic
  #
  - name: "paid_display"

    # Average raw impressions per user per day (Poisson λ)
    exposure_rate_per_user_per_day: 6.0

    # Base probability of click given a viewable exposure
    click_through_rate: 0.0015

    # If true, clicks may generate session_intent events
    incremental_intent: true

    params:

      # Fraction of impressions that become viewable exposures
      # (industry typical ~50–70%)
      viewable_share: 0.55

      # Maximum number of exposures per user per day
      freq_cap_per_user_per_day: 4

      # Multiplier applied to base CTR (useful for creative quality tests)
      ctr_multiplier: 1.0

      # Probability that a click generates incremental intent
      # (models lift vs passive demand)
      incremental_click_share: 0.8


  # ------------------------------------------------------------
  # Paid Search (Lower Funnel / Demand Capture)
  # ------------------------------------------------------------
  #
  # Intent-driven channel with:
  #   - Lower reach
  #   - Higher CTR
  #   - In-market gating
  #   - Brand vs non-brand differentiation
  #
  # Rate-driven interpretation:
  #   For each user:
  #     With probability in_market_share_per_day → eligible
  #     N ~ Poisson(exposure_rate_per_user_per_day)
  #     Up to freq_cap_per_user_per_day exposures
  #     CTR modified by brand/nonbrand mix
  #
  # Modeling assumptions:
  #   - Captures existing demand
  #   - Partial incrementality (substitution risk)
  #   - Lower carryover (handled in adstock feature later)
  #
  - name: "paid_search"

    # Average search impression opportunities per eligible user per day
    exposure_rate_per_user_per_day: 0.8

    # Base click probability before brand/nonbrand adjustments
    click_through_rate: 0.08

    # If true, clicks may generate session_intent events
    incremental_intent: true

    params:

      # Fraction of users considered "actively searching" on a given day
      in_market_share_per_day: 0.25

      # Max impressions per user per day
      freq_cap_per_user_per_day: 2

      # Fraction of impressions that are branded queries
      brand_share: 0.35

      # CTR multiplier for brand queries
      brand_ctr_multiplier: 1.8

      # CTR multiplier for non-brand queries
      nonbrand_ctr_multiplier: 0.9

      # Probability that a click is incremental
      # (brand often lower; non-brand often higher)
      incremental_click_share: 0.6


# ============================================================
# Adstock + Saturation (Transform Layer)
# ============================================================
#
# This feature does NOT create exposures or sessions directly.
# It transforms upstream spend (or other channel inputs) into an
# "effective" signal that reflects:
#   1) Carryover (adstock): past spend continues to contribute
#   2) Diminishing returns (saturation): marginal gains shrink at higher levels
#
# This will be consumed by a future campaigns/spend feature to produce
# DeliveryPlans (impressions over time) that feed channels_exposure.
#
adstock_saturation:
  enabled: true

  # If true, carryover state is tracked per (channel, campaign_id).
  # If false, state is tracked per channel only (campaigns share memory).
  per_campaign_state: false

  channels:

    # Paid Search: weak carryover (short half-life), saturates quickly
    paid_search:
      adstock:
        model: "geometric"
        half_life_days: 1.0
      saturation:
        model: "hill"
        alpha: 1.2
        gamma: 2000.0
        max_effect: 1.0

    # Paid Display: stronger carryover (longer half-life), saturates later
    paid_display:
      adstock:
        model: "geometric"
        half_life_days: 7.0
      saturation:
        model: "hill"
        alpha: 1.6
        gamma: 5000.0
        max_effect: 1.0
